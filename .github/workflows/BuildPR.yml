name: PullRequest

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-objective-git:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - xcode: 26.3
            os: macos-15-intel
            abi: x86_64
          - xcode: 26.3
            os: macos-26
            abi: arm64
    steps:
      - name: ls Xcode
        run: ls -la /Applications/Xcode*
      - name: Show openssl version
        run: |
          openssl version
          brew uninstall --ignore-dependencies openssl
          rm -rf /usr/local/etc/openssl@3
          rm -rf /usr/local/etc/openssl@1.1
          brew install openssl@3
          openssl version
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}
      - run: script/bootstrap
      - run: script/update_libgit2
      - name: Show openssl version
        run: |
          openssl version
      - name: Unlink openssl 3
        run: |
          brew unlink openssl@3
#      - name: Test project
#        run: xcodebuild -workspace ObjectiveGitFramework.xcworkspace -scheme "ObjectiveGit Mac" test ARCHS="${{ matrix.arch }}"
      - name: Archive project
        run: xcodebuild -workspace ObjectiveGitFramework.xcworkspace -scheme "ObjectiveGit Mac" archive ARCHS="${{ matrix.arch }}"
